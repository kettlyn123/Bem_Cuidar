<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda - Bem Cuidar</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="phone-container">
    <div class="phone-frame">
      <!-- Notch do Celular -->
      <div class="phone-notch"></div>
      
      <!-- Barra de Status do Celular -->
      <div class="phone-status-bar">
        <span class="status-time" id="statusBarTime">08:00</span>
        <div class="status-icons">
          <span>📶</span>
          <span>📶</span>
          <span>🔋</span>
        </div>
      </div>

      <!-- Tela do Celular -->
      <div class="phone-screen">
        <main class="app-shell">
          <header class="header">
            <div class="profile">
              <div class="avatar">JD</div>
              <div>
                <p>Olá, bem-vindo</p>
                <h1>John Doe</h1>
              </div>
            </div>
            <div class="date-time-row">
              <span id="dateDisplay" class="date-display"></span>
              <span id="timeDisplay" class="time-display"></span>
            </div>
          </header>

          <section class="content-section">
            <!-- Card do Calendário Semanal -->
            <div class="section-card">
              <div class="calendar-nav-row">
                <button id="prevWeekBtn" class="calendar-nav-btn">&larr;</button>
                <h2 id="calendarMonthYear">Junho 2026</h2>
                <button id="nextWeekBtn" class="calendar-nav-btn">&rarr;</button>
              </div>
              <div id="calendarContainer"></div>
            </div>

            <!-- Card dos Medicamentos Agendados -->
            <div class="section-card">
              <div class="agenda-header">
                <div>
                  <h2 id="agendaTitle">Medicamentos de Hoje</h2>
                  <p id="agendaLabel"></p>
                </div>
              </div>
              <div id="upcomingMedicines" class="medicine-grid" style="margin-top: 12px;"></div>
            </div>
          </section>
        </main>
      </div>

      <!-- Modal de Detalhes para tomar o remédio da agenda -->
      <div id="detailsModal" class="modal hidden">
        <div class="modal-content">
          <div class="modal-header">
            <h2 id="detailsTitle"></h2>
            <button class="btn-close" id="closeDetailsBtn">&times;</button>
          </div>

          <div id="medicineDetails" class="medicine-details">
            <!-- Preenchido por JS -->
          </div>

          <div class="modal-actions">
            <button class="btn-primary" id="consumeBtn" style="grid-column: span 2; width: 100%;">Tomar Dose</button>
          </div>
        </div>
      </div>

      <!-- Barra de Navegação Inferior -->
      <nav class="bottom-nav">
        <a href="index.html" class="nav-item">Início</a>
        <a href="profile.html" class="nav-item">Perfil</a>
        <a href="agenda.html" class="nav-item active">Agenda</a>
      </nav>

      <!-- Indicador Home do Celular -->
      <div class="phone-home-indicator"></div>
    </div>
  </div>

  <script src="js/shared.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/agenda.js"></script>
</body>
</html>
